<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="QuantumCalc - A premium, glassmorphic scientific and basic calculator web application featuring smooth animations, keyboard support, calculation history, and custom themes.">
    <title>QuantumCalc - Premium Scientific & Basic Calculator</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>


    <main class="calculator-app">
        <!-- Main Calculator Container -->
        <div class="calculator-card" id="calculator-card">
            <!-- Header Controls -->
            <header class="calculator-header">
                <h1 class="logo">QuantumCalc</h1>
                <div class="header-controls">
                    <!-- Audio Feedback Toggle -->
                    <button class="icon-btn" id="btn-sound" title="Toggle Sound Feedback" aria-label="Toggle sound feedback">
                        <svg class="icon sound-on-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                        <svg class="icon sound-off-icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <line x1="23" y1="9" x2="17" y2="15"></line>
                            <line x1="17" y1="9" x2="23" y2="15"></line>
                        </svg>
                    </button>
                    <!-- Mode Switcher (Basic / Sci) -->
                    <div class="mode-switch" id="mode-switcher-container" title="Switch Calculator Mode">
                        <span class="mode-label active" id="mode-basic">Basic</span>
                        <span class="mode-label" id="mode-sci">Sci</span>
                        <div class="mode-slider" id="mode-slider"></div>
                    </div>
                    <!-- History Button -->
                    <button class="icon-btn" id="btn-history" title="View Calculation History" aria-label="View history">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Calculator Display Screen -->
            <section class="calculator-display" aria-label="Display screen">
                <div class="display-container">
                    <div class="display-formula" id="display-formula" aria-live="polite"></div>
                    <div class="display-input-container">
                        <div class="display-input" id="display-input" aria-live="polite">0</div>
                    </div>
                </div>
            </section>

            <!-- Calculator Keypads Container -->
            <div class="keypad-container">
                <!-- Scientific Panel (Collapsible) -->
                <section class="keypad-scientific hidden" id="keypad-scientific" aria-label="Scientific keys">
                    <button class="btn btn-sci" id="btn-sin" data-val="sin(">sin</button>
                    <button class="btn btn-sci" id="btn-cos" data-val="cos(">cos</button>
                    <button class="btn btn-sci" id="btn-tan" data-val="tan(">tan</button>
                    <button class="btn btn-sci" id="btn-ln" data-val="ln(">ln</button>
                    <button class="btn btn-sci" id="btn-log" data-val="log(">log</button>
                    <button class="btn btn-sci" id="btn-pi" data-val="π">π</button>
                    <button class="btn btn-sci" id="btn-e" data-val="e">e</button>
                    <button class="btn btn-sci" id="btn-power" data-val="^">^</button>
                    <button class="btn btn-sci" id="btn-sqrt" data-val="√(">√</button>
                    <button class="btn btn-sci" id="btn-fact" data-val="!">x!</button>
                    <button class="btn btn-sci" id="btn-open-paren" data-val="(">(</button>
                    <button class="btn btn-sci" id="btn-close-paren" data-val=")">)</button>
                </section>

                <!-- Basic Panel -->
                <section class="keypad-basic" id="keypad-basic" aria-label="Basic keys">
                    <!-- Row 1 -->
                    <button class="btn btn-func" id="btn-ac" data-action="clear">AC</button>
                    <button class="btn btn-func" id="btn-del" data-action="delete">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"></path>
                            <line x1="18" y1="9" x2="12" y2="15"></line>
                            <line x1="12" y1="9" x2="18" y2="15"></line>
                        </svg>
                    </button>
                    <button class="btn btn-func" id="btn-percent" data-val="%">%</button>
                    <button class="btn btn-operator" id="btn-divide" data-val="÷">÷</button>

                    <!-- Row 2 -->
                    <button class="btn btn-num" id="btn-7" data-val="7">7</button>
                    <button class="btn btn-num" id="btn-8" data-val="8">8</button>
                    <button class="btn btn-num" id="btn-9" data-val="9">9</button>
                    <button class="btn btn-operator" id="btn-multiply" data-val="×">×</button>

                    <!-- Row 3 -->
                    <button class="btn btn-num" id="btn-4" data-val="4">4</button>
                    <button class="btn btn-num" id="btn-5" data-val="5">5</button>
                    <button class="btn btn-num" id="btn-6" data-val="6">6</button>
                    <button class="btn btn-operator" id="btn-subtract" data-val="-">−</button>

                    <!-- Row 4 -->
                    <button class="btn btn-num" id="btn-1" data-val="1">1</button>
                    <button class="btn btn-num" id="btn-2" data-val="2">2</button>
                    <button class="btn btn-num" id="btn-3" data-val="3">3</button>
                    <button class="btn btn-operator" id="btn-add" data-val="+">+</button>

                    <!-- Row 5 -->
                    <button class="btn btn-num" id="btn-toggle-sign" data-action="toggle-sign">±</button>
                    <button class="btn btn-num" id="btn-0" data-val="0">0</button>
                    <button class="btn btn-num" id="btn-decimal" data-val=".">.</button>
                    <button class="btn btn-equals" id="btn-equals">=</button>
                </section>
            </div>

            <!-- Calculation History Sidebar/Drawer -->
            <aside class="history-drawer" id="history-drawer" aria-label="Calculation history panel">
                <div class="history-header">
                    <h2>History</h2>
                    <div class="history-actions">
                        <button class="text-btn" id="btn-clear-history">Clear</button>
                        <button class="icon-btn" id="btn-close-history" aria-label="Close history">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="history-list" id="history-list">
                    <div class="no-history-msg">No history yet</div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Script File -->
    <script src="script.js"></script>
</body>
</html>
